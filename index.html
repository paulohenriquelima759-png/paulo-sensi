<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAULO SENSI</title>

<style>
body{
font-family: Arial;
background:#0b1a2b;
margin:0;
padding:0;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
color:#ff2b2b;
}

.search{
width:90%;
margin:auto;
display:block;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:20px;
}

.card{
background:#14263f;
margin:15px;
padding:20px;
border-radius:15px;
text-align:center;
}

button{
background:#ff2b2b;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.planos{
text-align:center;
margin-top:40px;
}

.plano{
background:#14263f;
margin:15px;
padding:20px;
border-radius:15px;
}

</style>
</head>

<body>

<header>PAULO SENSI</header>

<input class="search" id="busca" placeholder="Buscar celular..." onkeyup="buscar()">

<div id="lista">

<div class="card">
<h3>Samsung A16</h3>
<p>Geral: 95</p>
<p>Red Dot: 90</p>
<p>DPI: 420</p>
<button onclick="copiar('95 / 90 / DPI 420')">Copiar Sensibilidade</button>
</div>

<div class="card">
<h3>Samsung A12</h3>
<p>Geral: 92</p>
<p>Red Dot: 88</p>
<p>DPI: 400</p>
<button onclick="copiar('92 / 88 / DPI 400')">Copiar Sensibilidade</button>
</div>

<div class="card">
<h3>Redmi Note 11</h3>
<p>Geral: 94</p>
<p>Red Dot: 89</p>
<p>DPI: 420</p>
<button onclick="copiar('94 / 89 / DPI 420')">Copiar Sensibilidade</button>
</div>

<div class="card">
<h3>Moto G60</h3>
<p>Geral: 93</p>
<p>Red Dot: 90</p>
<p>DPI: 410</p>
<button onclick="copiar('93 / 90 / DPI 410')">Copiar Sensibilidade</button>
</div>

</div>

<div class="planos">

<h2>PLANOS</h2>

<div class="plano">
<h3>GRÁTIS</h3>
<p>Acesso básico</p>
</div>

<div class="plano">
<h3>PRO</h3>
<p>R$9,90</p>
</div>

<div class="plano">
<h3>PREMIUM</h3>
<p>R$19,90</p>
</div>

</div>

<script>

function copiar(texto){
navigator.clipboard.writeText(texto)
alert("Sensibilidade copiada!")
}

function buscar(){

let input=document.getElementById("busca").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{
if(card.innerText.toLowerCase().includes(input)){
card.style.display="block"
}else{
card.style.display="none"
}
})

}

</script>

</body>
</html>
