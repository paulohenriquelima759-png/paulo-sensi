<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAULO SENSI</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
background:#020617;
padding:20px;
font-size:26px;
font-weight:bold;
color:#ff2d2d;
}

.logo{
width:120px;
margin-top:10px;
}

.search{
margin:20px;
}

.search input{
padding:12px;
width:80%;

}

.card{
background:#1e293b;
margin:15px;
padding:20px;

}

button{
background:#ff2d2d;
border:none;
padding:12px 20px;
border-radius:10px;
color:white;
font-size:16px;

}

.planos{

}

.plano{

margin:10px;

</head>

<body>

<header>
PAULO SENSI
</header>

<div class="search">
<input placeholder="Buscar celular...">
</div>

<div class="card">
<h3>Samsung A16</h3>
<p>Geral: 95</p>
<p>Red Dot: 90</p>
<p>DPI: 420</p>
<button onclick="copiar()">Copiar Sensibilidade</button>
</div>

<div class="card">
<h3>Samsung A12</h3>
<p>Geral: 92</p>
<p>Red Dot: 88</p>
<p>DPI: 400</p>
<button onclick="copiar()">Copiar Sensibilidade</button>
</div>

<div class="planos">

<h2>Planos</h2>

<div class="plano">
<h3>Grátis</h3>
<p>Sensi básica</p>
</div>

<div class="plano">
<h3>Premium</h3>
<p>R$9,90</p>
</div>

<div class="plano">
<h3>Ultra</h3>
<p>R$19,90</p>
</div>

</div>

<script>

function copiar(){
alert("Sensibilidade copiada!");
}

</script>

</body>
  </html>
